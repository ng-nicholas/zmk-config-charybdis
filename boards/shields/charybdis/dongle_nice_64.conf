# Dongle configuration for nice!nano with 128x64 OLED

# Split central (dongle acts as central/receiver)
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# BLE
CONFIG_BT_MAX_CONN=6
CONFIG_BT_MAX_PAIRED=6

# Increase BLE transmit power for better range/stability
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Mouse/Trackball support - receive input from peripheral
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y

# Display
CONFIG_ZMK_DISPLAY=y

# Display items
CONFIG_ZMK_DONGLE_DISPLAY_BONGO_CAT=n
CONFIG_ZMK_DONGLE_DISPLAY_MODIFIERS=y
CONFIG_ZMK_DONGLE_DISPLAY_LAYER=y  # display current layer selected
CONFIG_ZMK_DONGLE_DISPLAY_LAYER_NAME_SCROLL_WIDTH=70  # default is 50 pixels
CONFIG_ZMK_DONGLE_DISPLAY_LAYER_TEXT_ALIGN="right"
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y # enable battery level fetching from peripherals
CONFIG_ZMK_DONGLE_DISPLAY_DONGLE_BATTERY=n # display dongle battery level (USB powered, not needed)
CONFIG_ZMK_DONGLE_DISPLAY_WPM=y # display WPM

# Reduce buffer size for 128x64 OLED stability
CONFIG_LV_Z_VDB_SIZE=64

# Display timeout - 5 minutes (300000 milliseconds)
CONFIG_ZMK_IDLE_TIMEOUT=300000

# Disable deep sleep (USB powered, always on)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=2147483647
